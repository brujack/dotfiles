name: CI

on:
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y bats shellcheck zsh

      - name: Run tests
        run: make test

  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check all shell scripts (bash)
        run: |
          find . -name '*.sh' \
            -not -path './.worktrees/*' \
            -not -path './tests/mocks/*' \
            | xargs -I{} bash -n {}

      - name: Syntax check all shell scripts (zsh)
        run: |
          find . -name '*.sh' \
            -not -path './.worktrees/*' \
            -not -path './tests/mocks/*' \
            | xargs -I{} zsh -n {}

  powershell:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install Pester + PSScriptAnalyzer
        run: |
          pwsh -Command "Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0"
          pwsh -Command "Install-Module PSScriptAnalyzer -Force -Scope CurrentUser"

      - name: Run tests with coverage gate
        working-directory: powershell
        run: |
          set -o pipefail
          make test | tee /tmp/pester-out.txt

      - name: Publish PowerShell coverage badge
        run: |
          PCT=$(grep "^Coverage:" /tmp/pester-out.txt | grep -oP '\d+(?:\.\d+)?' | head -1 | python3 -c "import sys,math; print(math.floor(float(sys.stdin.read().strip())))")
          if   [ "$PCT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 80 ]; then COLOR="green"
          elif [ "$PCT" -ge 70 ]; then COLOR="yellow"
          elif [ "$PCT" -ge 60 ]; then COLOR="orange"
          else                         COLOR="red"
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin coverage-data 2>/dev/null && \
            git worktree add /tmp/cov-data coverage-data || \
            git worktree add -b coverage-data --orphan /tmp/cov-data
          printf '{"schemaVersion":1,"label":"PowerShell coverage","message":"%s%%","color":"%s"}\n' \
            "$PCT" "$COLOR" > /tmp/cov-data/powershell.json
          cd /tmp/cov-data
          git add .
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git pull origin coverage-data --rebase 2>/dev/null || true
            git diff --staged --quiet || git commit -m "coverage: powershell.json → ${PCT}%"
            git push origin coverage-data && break
            sleep $((RANDOM % 5 + 1))
          done

  bash-coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck zsh jq cmake libcurl4-openssl-dev libelf-dev libdw-dev binutils-dev libiberty-dev

      - name: Install kcov from source
        run: |
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov/build
          cmake --build /tmp/kcov/build --parallel $(nproc)
          sudo cmake --install /tmp/kcov/build

      - name: Run coverage
        run: make coverage

      - name: Publish bash coverage badge
        run: |
          INDEX="coverage/kcov-merged/index.json"
          if [ ! -f "$INDEX" ]; then
            INDEX=$(find coverage -name "index.json" | head -1)
          fi
          PCT=$(python3 -c "import json,math; d=json.load(open('$INDEX')); print(math.floor(float(d.get('percent_covered', d.get('covered_percent', 0)))))")
          if   [ "$PCT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 80 ]; then COLOR="green"
          elif [ "$PCT" -ge 70 ]; then COLOR="yellow"
          elif [ "$PCT" -ge 60 ]; then COLOR="orange"
          else                         COLOR="red"
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin coverage-data 2>/dev/null && \
            git worktree add /tmp/cov-data coverage-data || \
            git worktree add -b coverage-data --orphan /tmp/cov-data
          printf '{"schemaVersion":1,"label":"bash coverage","message":"%s%%","color":"%s"}\n' \
            "$PCT" "$COLOR" > /tmp/cov-data/bash.json
          cd /tmp/cov-data
          git add .
          git diff --staged --quiet && exit 0
          for i in 1 2 3; do
            git pull origin coverage-data --rebase 2>/dev/null || true
            git diff --staged --quiet || git commit -m "coverage: bash.json → ${PCT}%"
            git push origin coverage-data && break
            sleep $((RANDOM % 5 + 1))
          done

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          source lib/constants.sh
          wget -qO /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "HEAD~50..HEAD" \
            --verbose

  auto-merge:
    needs: [test, lint-macos, powershell, secret-scan]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Auto-merge passing PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.head_ref || github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "${PR}" ]]; then
            gh pr merge "${PR}" --squash
          fi
