name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y bats shellcheck zsh

      - name: Run tests
        run: make test

  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check all shell scripts (bash)
        run: |
          find . -name '*.sh' \
            -not -path './.worktrees/*' \
            -not -path './tests/mocks/*' \
            | xargs -I{} bash -n {}

      - name: Syntax check all shell scripts (zsh)
        run: |
          find . -name '*.sh' \
            -not -path './.worktrees/*' \
            -not -path './tests/mocks/*' \
            | xargs -I{} zsh -n {}

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          GITLEAKS_VER="8.21.2"
          wget -qO /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "HEAD~50..HEAD" \
            --verbose

  auto-merge:
    needs: [test, lint-macos, secret-scan]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Auto-merge passing PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "${PR}" ]]; then
            gh pr merge "${PR}" --squash
          fi
