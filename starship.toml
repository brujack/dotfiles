# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = false

# Change the default prompt format
#format = """\
#[в•ӯв•ҙ](238)$env_var\
#$all[в•°в”Җ](238)$character"""

format = """\
(238)$env_var $all (238)$character"""

right_format = "$memory_usage${custom.cpu_macos}${custom.cpu_linux}"

# Change the default prompt characters
[character]
success_symbol = "[п•“](238)"
error_symbol = "[п•“](238)"

[shell]
zsh_indicator = "zsh"
powershell_indicator = "pwsh"
style = "white bold"
disabled = false

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold white) '
variable = "STARSHIP_DISTRO"
disabled = false

[username]
style_user = "white bold"
style_root = "black bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](white bold) "
trim_at = ".home.conecrazy.ca"

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "пҹқ ~"
read_only_style = "197"
read_only = " пҖЈ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "пһЎ "
format = "on [$symbol$branch]($style) "
truncation_length = 6
truncation_symbol = "вҖҰ/"
style = "bold green"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold green"
conflicted = "рҹҸі ${count}"
up_to_date = "пҖҢ "
untracked = "п”© ${count}"
ahead = "вҮЎ ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ ${count}"
stashed = "пЈ– ${count}"
modified = "пҒ„ ${count}"
staged = '[++\($count\)](green)'
renamed = "r ${count}"
deleted = "пҖ” ${count}"

[terraform]
format = "via [п„ө terraform $version]($style) @ [$workspace]($style) "

[vagrant]
disabled = true

[helm]
format = "via [пҲҡ $version](bold purple) "

[nodejs]
disabled = true

[python]
symbol = "п ҹ "
python_binary = "python3"

[ruby]
disabled = true

[kubernetes]
format = 'on [пҲҡ $context\($namespace\)](bold purple) '
disabled = false

[docker_context]
format = "via [рҹҗӢ $context](blue bold)"

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
symbol = "вҳҒпёҸ "

[azure]
disabled = true

[gcloud]
disabled = true

[memory_usage]
disabled = false
threshold = -1
format = "[$symbol${ram}( | ${swap})]($style) "
symbol = "у°Қӣ "
style = "white bold"

[custom.cpu_macos]
# top -l 1 exceeds starship command_timeout (500ms); ps sum is instant on macOS
command = "ps -A -o %cpu= 2>/dev/null | awk '{s+=$1} END { if (s>100) s=100; printf \"%.0f%%\", s+0 }'"
description = "CPU usage (macOS)"
format = "[$symbol$output]($style) "
symbol = "у°»  "
style = "white bold"
when = true
os = "macos"
use_stdin = false
shell = ["bash", "--noprofile", "--norc", "-c"]

[custom.cpu_linux]
command = "top -bn1 2>/dev/null | sed -n 's/.*, *\\([0-9.]*\\) id.*/\\1/p' | awk '{printf \"%.0f%%\", 100-$1}'"
description = "CPU usage (Linux)"
format = "[$symbol$output]($style) "
symbol = "у°»  "
style = "white bold"
when = true
os = "linux"
use_stdin = false
shell = ["bash", "--noprofile", "--norc", "-c"]

[battery]
disabled = true
